<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<link rel="stylesheet" type="text/css" href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" />

<head>
    <meta charset="utf-8">
    <title>Gestion des Livres</title>
</head>

<body>

<div th:replace="template"></div>

<div class="container mt-5">
    <div class="card">

        <!-- En-tête selon le mode -->
        <div class="card-header" th:text="${mode=='new'} ? 'Ajout des Livres' : 'Modification des Livres'"></div>

        <div class="card-body">

            <form th:action="@{${mode=='new' ? '/saveLivre' : '/updateLivre'}}" method="post">
                <input type="hidden" name="page" th:value="${page}" />
                <input type="hidden" name="size" th:value="${size}" />
                <input type="hidden" name="idLivre" th:value="${livre.idLivre}" />

                <div class="form-group">
                    <label>Nom Livre :</label>
                    <input type="text" name="nomLivre" class="form-control" th:value="${livre.nomLivre}" />
                    <span th:errors="${livre.nomLivre}" class="text-danger"></span>
                </div>

                <div class="form-group">
                    <label>Auteur :</label>
                    <input type="text" name="auteur" class="form-control" th:value="${livre.auteur}" />
                    <span th:errors="${livre.auteur}" class="text-danger"></span>
                </div>

                <div class="form-group">
                    <label>Prix :</label>
                    <input type="text" name="prixLivre" class="form-control" th:value="${livre.prixLivre}" />
                    <span th:errors="${livre.prixLivre}" class="text-danger"></span>
                </div>

                <div class="form-group">
                    <label>Date de publication :</label>
                    <input type="date" name="Datedepublication" class="form-control" 
                           th:value="${livre.Datedepublication != null} ? ${#dates.format(livre.Datedepublication,'yyyy-MM-dd')} : ''" />
                    <span th:errors="${livre.Datedepublication}" class="text-danger"></span>
                </div>

                <div class="form-group">
                    <label>Email :</label>
                    <input type="email" name="email" class="form-control" th:value="${livre.email}" />
                    <span th:errors="${livre.email}" class="text-danger"></span>
                </div>

                <div class="form-group">
                    <label>Thème :</label>
                    <select name="theme.idThe" class="form-control">
                        <option th:each="t : ${themes}" 
                                th:value="${t.idThe}" 
                                th:text="${t.nomThe}" 
                                th:selected="${livre.theme != null} ? ${t.idThe == livre.theme.idThe} : false">
                        </option>
                    </select>
                </div>

                <div>
                    <button type="submit" class="btn btn-primary"
                            th:text="${mode=='new'} ? 'Ajouter' : 'Modifier'"></button>
                </div>

            </form>

        </div>
    </div>
</div>

</body>
</html>
